<svg width="100%" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background: white;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Step labels on left -->
<text font-size="12" x="30" y="72" text-anchor="middle" fill="#888780">1</text>
<text font-size="12" x="30" y="164" text-anchor="middle" fill="#888780">2</text>
<text font-size="12" x="30" y="256" text-anchor="middle" fill="#888780">3</text>
<text font-size="12" x="30" y="346" text-anchor="middle" fill="#888780">4</text>
<text font-size="12" x="30" y="436" text-anchor="middle" fill="#888780">5</text>
<text font-size="12" x="30" y="528" text-anchor="middle" fill="#888780">6</text>

<!-- Step 1: User types question -->
<rect x="50" y="44" width="580" height="56" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="68" text-anchor="middle" fill="#085041">Accountant types a question</text>
<text font-size="12" x="340" y="88" text-anchor="middle" fill="#0F6E56">"Geçen ay tahakkuk eden KDV ne kadar?"</text>

<line x1="340" y1="100" x2="340" y2="126" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 2: tRPC + Clerk -->
<rect x="50" y="128" width="270" height="56" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="185" y="152" text-anchor="middle" fill="#3C3489">Clerk session verified</text>
<text font-size="12" x="185" y="170" text-anchor="middle" fill="#534AB7">company_id resolved from org</text>

<rect x="336" y="128" width="294" height="56" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="483" y="152" text-anchor="middle" fill="#3C3489">tRPC cfo router</text>
<text font-size="12" x="483" y="170" text-anchor="middle" fill="#534AB7">Calls vanna-inference Trigger.dev task</text>

<line x1="340" y1="184" x2="340" y2="210" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 3: Vanna inference -->
<rect x="50" y="212" width="270" height="72" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="185" y="236" text-anchor="middle" fill="#633806">Vanna.AI</text>
<text font-size="12" x="185" y="254" text-anchor="middle" fill="#854F0B">Embeds question via Gemini</text>
<text font-size="12" x="185" y="270" text-anchor="middle" fill="#854F0B">Finds 3 similar past Q&amp;A pairs</text>

<rect x="336" y="212" width="294" height="72" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="483" y="236" text-anchor="middle" fill="#2C2C2A">pgvector (Supabase)</text>
<text font-size="12" x="483" y="254" text-anchor="middle" fill="#5F5E5A">Training corpus: 50+ Q&amp;A pairs</text>
<text font-size="12" x="483" y="270" text-anchor="middle" fill="#5F5E5A">Cosine similarity search</text>

<!-- Bidirectional arrows between Vanna and pgvector -->
<line x1="320" y1="248" x2="338" y2="248" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="338" y1="266" x2="320" y2="266" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="340" y1="284" x2="340" y2="310" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 4: Gemini generates SQL -->
<rect x="50" y="312" width="580" height="56" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="336" text-anchor="middle" fill="#3C3489">Gemini Pro generates SQL</text>
<text font-size="12" x="340" y="354" text-anchor="middle" fill="#534AB7">Schema + 3 few-shot examples → SELECT only, safety-checked</text>

<line x1="340" y1="368" x2="340" y2="394" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 5: User confirms -->
<rect x="50" y="396" width="580" height="56" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="420" text-anchor="middle" fill="#085041">SQL preview shown — user confirms</text>
<text font-size="12" x="340" y="438" text-anchor="middle" fill="#0F6E56">ai_query_log written (was_approved: false) → user clicks Run</text>

<line x1="340" y1="452" x2="340" y2="478" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 6: DuckDB + result -->
<rect x="50" y="480" width="270" height="56" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="185" y="504" text-anchor="middle" fill="#2C2C2A">DuckDB (read-only role)</text>
<text font-size="12" x="185" y="522" text-anchor="middle" fill="#5F5E5A">Executes on reporting views</text>

<rect x="336" y="480" width="294" height="56" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="483" y="504" text-anchor="middle" fill="#085041">Results + Gemini summary</text>
<text font-size="12" x="483" y="522" text-anchor="middle" fill="#0F6E56">AG Grid table + ECharts auto-chart</text>

<line x1="320" y1="508" x2="338" y2="508" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Feedback loop arrow -->
<path d="M 630 508 L 650 508 L 650 570 L 140 570 L 140 570" fill="none" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text font-size="12" x="420" y="586" text-anchor="middle" fill="#534AB7">thumbs up → added to Vanna training corpus</text>

</svg>
